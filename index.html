<style>
  /*
    CSS 區塊地圖
    1. 基礎變數 / 全域版面: :root、body、viewport、canvas
    2. 浮動工具列 / 右鍵選單 / Toast / Zoom / Drop hint
    3. 節點樣式: 一般節點、層級、選取、收合鈕、拖曳提示

  :root{
    --bg:#f4f6f9; --panel:#ffffff; --line:#c2ccd8; --txt:#1f2933;
    --accent:#2f6fed; --accent2:#e8f0ff; --danger:#e5484d; --node-wrap-width:50em;

  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:"Microsoft JhengHei","PingFang TC",system-ui,sans-serif;color:var(--txt);-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  #app{display:flex;flex-direction:column;height:100%;background:var(--bg);}
  /* 浮動工具視窗 */
  .floatwin{position:fixed;background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:0 6px 22px rgba(20,40,80,.18);z-index:100;display:flex;flex-direction:column;overflow:hidden;}
  .fwhead{display:flex;align-items:center;gap:6px;padding:6px 10px;background:#eef2f7;border-bottom:1px solid var(--line);
    cursor:move;user-select:none;font-size:11px;font-weight:700;color:#5a6470;letter-spacing:.6px;white-space:nowrap;}
  .fwhead .fwcollapse{margin-left:auto;border:none;background:transparent;cursor:pointer;font-size:13px;color:#5a6470;
    width:20px;height:20px;border-radius:5px;line-height:1;padding:0;}
  .fwhead .fwcollapse:hover{background:#fff;}
  .fwbrand{cursor:move;font-size:14px;font-weight:800;color:var(--accent);letter-spacing:0;border-bottom:none;}
  .fwver{padding:3px 11px 7px;font-size:11px;color:#9aa5b1;white-space:nowrap;user-select:none;}
  .save-state{display:inline-flex;align-items:center;margin-left:7px;padding:1px 6px;border-radius:999px;font-size:10px;font-weight:700;border:1px solid rgba(148,163,184,.55);color:#64748b;background:rgba(148,163,184,.12);}
  .save-state.saved{color:#0f766e;border-color:rgba(20,184,166,.42);background:rgba(20,184,166,.14);}
  .save-state.dirty{color:#b45309;border-color:rgba(245,158,11,.46);background:rgba(245,158,11,.17);}
  .save-info{display:block;margin-top:3px;color:#64748b;font-size:10px;font-weight:700;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .fwbody{display:flex;flex-wrap:nowrap;align-items:center;gap:3px;padding:7px;width:max-content;}
  .floatwin.collapsed{box-shadow:0 3px 12px rgba(20,40,80,.16);}
  .floatwin.collapsed .fwhead{border-bottom:none;}
  .floatwin.collapsed .fwbody{display:none;}

  button.tb small{opacity:.5;font-size:11px;margin-left:3px;}

  #viewport.panning{cursor:grabbing;}
  #canvas{position:absolute;left:0;top:0;transform-origin:0 0;}
  svg#edges{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}

  .node{position:absolute;width:max-content;max-width:var(--node-wrap-width);padding:7px 12px;border-radius:9px;background:#fff;
    border:1.5px solid var(--line);font-size:14px;line-height:1.4;cursor:pointer;user-select:none;
    writing-mode:horizontal-tb;box-shadow:0 1px 4px rgba(20,40,80,.08);
    white-space:pre-wrap;overflow-wrap:break-word;word-break:normal;
    transition:transform .2s ease,opacity .16s ease,box-shadow .12s,border-color .12s;}
  .node.node-enter{opacity:0;transform:scale(.94);}
  .node:hover{border-color:var(--accent);}
  .node .ckbox{cursor:pointer;margin-right:5px;font-size:1.05em;line-height:1;}
  .node .nicon{margin-right:4px;}
  .node .norder{margin-right:5px;font-weight:700;opacity:.75;}
  .node.preamble,.node.lv0.preamble{font-size:30px;line-height:1.45;padding:13px 18px;max-width:min(2200px, calc(100vw - 48px));font-weight:800;overflow-wrap:normal;word-break:keep-all;}
  .node.quote{font-style:italic; background:#1a1a1a !important; border-color:#1a1a1a !important; color:#ffffff !important;}
  .node.quote .ntext{opacity:.95;}
  /* 標題泡泡內的引言註解:內嵌的引用塊小泡泡(泡泡中有泡泡)*/
  .node .nnote{ display:block; margin-top:7px; padding:7px 11px;
    border-radius:8px;
    background:#1a1a1a; color:#ffffff; opacity:1;
    font-size:.88em; font-style:italic; white-space:normal; cursor:text; }
  .node .nnote.editing{ outline:2px solid var(--accent); outline-offset:2px; font-style:normal; white-space:pre-wrap; }
  .node .nnote .nqline{ display:block; line-height:1.5; opacity:.95; }
  .node .nnote .nqline + .nqline{ margin-top:2px; }
  .node a.mlink{color:inherit;text-decoration:underline;text-underline-offset:2px;cursor:pointer;}
  .node a.mlink:hover{text-decoration-thickness:2px;}
  .node img.mimg{ display:block; max-width:160px; max-height:88px; min-width:64px; min-height:36px; width:auto; height:auto;
    border-radius:6px; margin:1px auto; object-fit:contain; }
  .node .ntext.hasimg{ display:block; }
  .node img.mimg.broken{ display:inline-block; min-width:0; }
  /* 腳註引用標記:可點的上標數字 */
  .node sup.fnref{ font-size:.7em; line-height:0; vertical-align:super; cursor:pointer;
    color:#2563eb; font-weight:700; padding:0 1px; }
  .node strong{ color:var(--fx-bold,#c2410c); font-weight:800; }
  .node em{ color:var(--fx-em,#7c3aed); font-style:italic; }
  .node del{ color:var(--fx-del,#64748b); text-decoration-color:var(--fx-del-line,#ef4444); text-decoration-thickness:1.5px; }
  .node a.mlink{ color:var(--fx-link,#0369a1); font-weight:700; text-decoration-color:var(--fx-link-line,rgba(3,105,161,.45)); text-underline-offset:2px; }
  .node sup.fnref:hover{ text-decoration:underline; }
  /* 腳註定義節點:左側標記 + 略淡,辨識為「註腳」 */
  .node.fndef{ font-size:.94em; opacity:.9; }
  .node.fndef .fnlabel{ display:inline-block; font-weight:700; color:#2563eb;
    margin-right:5px; font-size:.92em; }
  /* GFM 警示框 callout(> [!NOTE] 等):依類型上色,標題列含圖示 */
  .node.alert{ border-left-width:5px; border-left-style:solid; }
  .node.alert .altitle{ display:block; font-weight:800; font-size:.9em; margin-bottom:3px; letter-spacing:.3px; }
  .node.alert .albody{ display:block; white-space:pre-wrap; font-size:.95em; opacity:.92; }
  .node.alert.note    { border-left-color:#2563eb; }   .node.alert.note .altitle    { color:#2563eb; }
  .node.alert.tip     { border-left-color:#16a34a; }   .node.alert.tip .altitle     { color:#16a34a; }
  .node.alert.important{ border-left-color:#9333ea; }  .node.alert.important .altitle{ color:#9333ea; }
  .node.alert.warning { border-left-color:#d97706; }   .node.alert.warning .altitle { color:#d97706; }
  .node.alert.caution { border-left-color:#dc2626; }   .node.alert.caution .altitle { color:#dc2626; }
  .node.done{opacity:.6;}
  .iconbtn{font-size:15px;padding:4px 6px;line-height:1;}
  .node.sel{border-color:var(--accent) !important;box-shadow:0 0 0 2px #fff,0 0 0 5px var(--accent) !important;z-index:4;}
  .node.editing{cursor:text;outline:none;}
  .node.droptarget{border-color:var(--danger);box-shadow:0 0 0 4px rgba(229,72,77,.28),0 8px 24px rgba(20,40,80,.20);transform:scale(1.035);}
  .node.dragging{opacity:.35;}
  .node.match{box-shadow:0 0 0 3px #ffd54f;}
  .node.match-current{box-shadow:0 0 0 4px #fb8c00 !important;border-color:#fb8c00 !important;}
  #searchBar{position:absolute;top:12px;right:14px;display:none;align-items:center;gap:6px;background:#fff;

  .report-action.safe:hover{background:#d1fae5;color:#065f46;}

  .report-action.quiet:hover{background:rgba(148,163,184,.12);color:#64748b;}

  /* ===== 深色介面(切換 App 外觀;節點顏色固定使用 Vivid 自動調整)===== */

  /* ===== 右側原始 Markdown 面板(雙向同步) ===== */
  :root{ --mdw:360px; }

  .node.tablenode{ max-width:920px; }

  .node.hrnode{ width:170px; min-width:120px; max-width:none; padding:9px 0; opacity:1; cursor:grab;

  .node.hrnode::before{ content:""; position:absolute; left:0; right:0; top:-8px; bottom:-8px; border-radius:8px; }

<body>
<div id="app">
  <div id="viewport">
    <div id="canvas"><svg id="edges"></svg></div>
    <div id="empty"><b>還沒有內容</b><div>在空白處按右鍵 →「檔案 → 開啟 / 新建」,或把 .md 檔拖進來</div></div>
    <div id="drop">放開以匯入 Markdown</div>
    <div id="status"></div>
    <div id="searchBar">
      <input id="searchInput" placeholder="搜尋節點…" autocomplete="off">
      <span id="searchCount">0/0</span>
      <button id="searchPrev" title="上一個 (Shift+Enter)">↑</button>
      <button id="searchNext" title="下一個 (Enter)">↓</button>
      <button id="searchClose" title="關閉 (Esc)">✕</button>

  const tm = title.match(/^\[([ xX])\]\s+(.*)$/);

function splitTableRow(line){
  let s=String(line).trim();
  if(s.startsWith('|')) s=s.slice(1);
  if(s.endsWith('|'))  s=s.slice(0,-1);
  const cells=[]; let cur='', esc=false;
  for(const ch of s){
    if(esc){ cur+=(ch==='|'?'|':'\\'+ch); esc=false; continue; }
    if(ch==='\\'){ esc=true; continue; }
    if(ch==='|'){ cells.push(cur.trim()); cur=''; continue; }
    cur+=ch;
  }
  if(esc) cur+='\\';
  cells.push(cur.trim());
  return cells;
}
function isTableDelimRow(line){

}

}
function alignToDelim(a){ return a==='center'?':---:':a==='right'?'---:':a==='left'?':---':'---'; }
function tableToMdRows(tbl){

  rows.push('| '+tbl.header.map(cell).join(' | ')+' |');

  return rows;
}
function tableHtml(tbl){

function analyzeMarkdownPanelText(text){
  const lines=String(text||'').replace(/\r/g,'').split('\n');
  const issues=[];
  const push=(line, level, message)=>issues.push({line:Math.max(1,line+1), level, message});
  let fence=null, htmlComment=null, details=null;
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const fm=line.match(/^\s{0,3}(`{3,}|~{3,})/);
    if(fm){
      if(!fence) fence={line:i, mark:fm[1][0], len:fm[1].length};
      else if(fm[1][0]===fence.mark && fm[1].length>=fence.len) fence=null;
      continue;
    }
    if(fence) continue;
    if(htmlComment==null && /^\s{0,3}<!--/.test(line) && !/-->/.test(line)) htmlComment=i;
    if(htmlComment!=null && i!==htmlComment && /-->/.test(line)) htmlComment=null;
    if(details==null && /^\s{0,3}<details(?:\s|>)/i.test(line) && !/<\/details>/i.test(line)) details=i;
    if(details!=null && i!==details && /<\/details>/i.test(line)) details=null;
    if(line.indexOf('|')>=0 && i+1<lines.length && isTableDelimRow(lines[i+1])){
      const cols=splitTableRow(line).length, delim=splitTableRow(lines[i+1]).length;
      if(cols!==delim) push(i+1, 'error', `表格分隔列欄數 ${delim} 欄,但表頭是 ${cols} 欄`);
      else {
        for(let j=i+2;j<lines.length;j++){
          const row=lines[j];
          if(row.trim()==='' || row.indexOf('|')<0) break;
          const cells=splitTableRow(row).length;
          if(cells!==cols){ push(j, 'warn', `表格資料列有 ${cells} 欄,表頭是 ${cols} 欄`); break; }
        }
      }
    }
  }
  if(fence) push(fence.line, 'error', `程式碼區塊少了結尾 ${fence.mark.repeat(fence.len)}`);
  if(htmlComment!=null) push(htmlComment, 'error', 'HTML 註解少了結尾 -->');
  if(details!=null) push(details, 'warn', '<details> 少了結尾 </details>');
  issues.sort((a,b)=>a.line-b.line || (a.level==='error'?-1:1));
  return {ok:!issues.some(i=>i.level==='error'), issues};
}

      const nd=nodeFrom(line.trim()); nd.kind='p'; nd._srcLine=li; attach(nd, headingDepth + 1); paraNode=nd; setNoteTarget(nd, 0);
      setListParent(nd, headingDepth + 1, 0, false); }   // 此段落可成為緊接其後頂格清單的父節點
  }
  if(!rootsOut.length) rootsOut.push(makeNode('心智圖'));
  rootsOut.forEach(r=>setParents(r, null));
  return rootsOut;
}

//===================== Markdown 輸出(100% 原生:標題/清單/任務清單/粗斜體/emoji;不含顏色)=====================
function toMarkdown(rootsArr){
  return buildMdRows(rootsArr).map(r=>r.t).join('\n') + '\n';
}

//===================== 版面配置(固定 Markdown 順序:父節點在左,同層由上往下) =====================
const HGAP = 54, VGAP = 18;       // 固定版面:欄距 / 同層垂直間距
const ROWGAP = 58, COLGAP = 26;   // 舊直式相容:列距 / 同層水平間距
const TRUNK_GAP = 28;             // 幹線(分支交點)距父節點的距離;連線與開關鈕共用
const HR_MIN_WIDTH = 180;         // 水平分隔線的基準寬度,避免短線太像裝飾點
let orient = 'h';                 // 固定 Markdown 順序:父節點在左、同層節點由上往下排列

function isBranchNode(n){ return !!n && n.kind!=='hr'; }
function visibleChildren(n){ return n.kind==='hr' ? [] : (n.collapsed ? [] : n.children); }
function branchChildren(n, opts){
  const source = opts && opts.includeCollapsed ? (n.children||[]) : visibleChildren(n);
  return source.filter(isBranchNode);
}
function hasBranchChildren(n){ return branchChildren(n, {includeCollapsed:true}).length>0; }
function measure(node){
  const list = [];
  (function walk(n, depth){ list.push({node:n,depth}); for(const c of visibleChildren(n)) walk(c, depth+1); })(node,0);
  return list;
}
// 座標慣例(兩種方向皆然,讓定位/置中程式碼不變):_x = 左緣,_y = 垂直中心
function layout(node, mainPos){
  if(orient==='h'){
    function shiftY(n, dy){ n._y+=dy; for(const c of visibleChildren(n)) shiftY(c, dy); }
    function fullBoundsY(n){
      let min=n._y-n._h/2, max=n._y+n._h/2;
      for(const c of visibleChildren(n)){ const b=fullBoundsY(c); min=Math.min(min,b.min); max=Math.max(max,b.max); }
      return {min,max};
    }
    function branchBoundsY(n){
      let min=n._y-n._h/2, max=n._y+n._h/2;
      for(const c of branchChildren(n)){ const b=branchBoundsY(c); min=Math.min(min,b.min); max=Math.max(max,b.max); }
      return {min,max};
    }
    function decorBandSize(items, gap){
      const decor=items.filter(c=>!isBranchNode(c));
      if(!decor.length) return gap;
      return gap*(decor.length+1) + decor.reduce((sum,c)=>sum+(c._h||0),0);
    }
    function positionDecorBySourceOrder(n, ch, childX){
      function placeDecorList(list, startY, endY){
        if(!list.length) return;
        const contentH=list.reduce((sum,c)=>sum+(c._h||0),0);
        const gap=Math.max(0,(endY-startY-contentH)/(list.length+1));
        let y=startY+gap;
        for(const c of list){
          c._x=childX;
          c._y=y+c._h/2;
          c._sub=c._h;
          y+=c._h+gap;
          for(const gc of visibleChildren(c)){
            if(gc._x==null || gc._y==null){
              gc._x=c._x+c._w+HGAP;
              gc._y=c._y;
              gc._sub=gc._h||0;
            }
          }
        }
      }
      const branchItems=ch.map((node,index)=>({node,index})).filter(it=>isBranchNode(it.node));
      if(!branchItems.length){
        placeDecorList(ch.filter(c=>!isBranchNode(c)), n._y+n._h/2+VGAP/2, n._y+n._h/2+VGAP*2);
        return;
      }
      const leading=ch.slice(0,branchItems[0].index).filter(c=>!isBranchNode(c));
      if(leading.length){
        const nb=branchBoundsY(branchItems[0].node);
        const band=decorBandSize(leading, VGAP);
        placeDecorList(leading, nb.min-band, nb.min);
      }
      for(let i=0;i<branchItems.length-1;i++){
        const left=branchItems[i], right=branchItems[i+1];
        const between=ch.slice(left.index+1,right.index).filter(c=>!isBranchNode(c));
        if(!between.length) continue;
        const pb=branchBoundsY(left.node), nb=branchBoundsY(right.node);
        placeDecorList(between, pb.max, nb.min);
      }
      const trailing=ch.slice(branchItems[branchItems.length-1].index+1).filter(c=>!isBranchNode(c));
      if(trailing.length){
        const pb=branchBoundsY(branchItems[branchItems.length-1].node);
        const band=decorBandSize(trailing, VGAP);
        placeDecorList(trailing, pb.max, pb.max+band);
      }
    }
    function place(n, depth, top, x){ n._x=x;                    // 子節點與自己的父節點保持固定間距
      const ch=visibleChildren(n);
      if(!ch.length){ n._y=top+n._h/2; n._sub=n._h; return fullBoundsY(n); }
      let cursor=top, first=null, last=null;
      const childX=n._x+n._w+HGAP;
      const branchItems=ch.map((node,index)=>({node,index})).filter(it=>isBranchNode(it.node));
      for(let i=0;i<branchItems.length;i++){
        const item=branchItems[i], c=item.node;
        let b=place(c,depth+1,cursor,childX);
        const dy=cursor-b.min;
        if(Math.abs(dy)>0.01){ shiftY(c,dy); b={min:b.min+dy,max:b.max+dy}; }
        first=first||c; last=c;
        const next=branchItems[i+1];
        const between=next ? ch.slice(item.index+1,next.index) : [];
        cursor=b.max+decorBandSize(between, VGAP);
      }
      if(first && last) n._y=(first._y+last._y)/2;
      else n._y=top+n._h/2;
      positionDecorBySourceOrder(n, ch, childX);
      const b=branchItems.length ? fullBoundsY(n) : {min:n._y-n._h/2,max:n._y+n._h/2};
      n._sub=Math.max(n._h,b.max-b.min); return b;
    }
    place(node,0,0,0);
  } else {
    function decorBandSizeX(items, gap){
      const decor=items.filter(c=>!isBranchNode(c));
      if(!decor.length) return gap;
      return gap*(decor.length+1) + decor.reduce((sum,c)=>sum+(c._w||0),0);
    }
    function subSize(n){ const ch=visibleChildren(n);
      if(!ch.length){ n._sub=n._w; return n._sub; }
      const branchItems=ch.map((node,index)=>({node,index})).filter(it=>isBranchNode(it.node));
      if(!branchItems.length){ n._sub=n._w; return n._sub; }
      let s=0;
      const leading=ch.slice(0,branchItems[0].index);
      if(leading.length) s+=decorBandSizeX(leading, COLGAP);
      for(let i=0;i<branchItems.length;i++){
        const item=branchItems[i], next=branchItems[i+1];
        s+=subSize(item.node);
        if(next) s+=decorBandSizeX(ch.slice(item.index+1,next.index), COLGAP);
      }
      const trailing=ch.slice(branchItems[branchItems.length-1].index+1);
      if(trailing.length) s+=decorBandSizeX(trailing, COLGAP);
      n._sub=Math.max(s,n._w); return n._sub; }
    function positionDecorXBySourceOrder(n, ch, childY){
      function branchBoundsX(bn){
        let min=bn._x, max=bn._x+bn._w;
        for(const bc of branchChildren(bn)){ const b=branchBoundsX(bc); min=Math.min(min,b.min); max=Math.max(max,b.max); }
        return {min,max};
      }
      function placeDecorList(list, startX, endX){
        if(!list.length) return;
        const contentW=list.reduce((sum,c)=>sum+(c._w||0),0);
        const gap=Math.max(0,(endX-startX-contentW)/(list.length+1));
        let x=startX+gap;
        for(const c of list){
          c._x=x;
          c._y=childY+c._h/2;
          c._sub=c._w;
          x+=c._w+gap;
        }
      }
      const branchItems=ch.map((node,index)=>({node,index})).filter(it=>isBranchNode(it.node));
      if(!branchItems.length){
        placeDecorList(ch.filter(c=>!isBranchNode(c)), n._x+n._w/2, n._x+n._w/2+COLGAP*2);
        return;
      }
      const leading=ch.slice(0,branchItems[0].index).filter(c=>!isBranchNode(c));
      if(leading.length){
        const nb=branchBoundsX(branchItems[0].node);
        const band=decorBandSizeX(leading, COLGAP);
        placeDecorList(leading, nb.min-band, nb.min);
      }
      for(let i=0;i<branchItems.length-1;i++){
        const left=branchItems[i], right=branchItems[i+1];
        const between=ch.slice(left.index+1,right.index).filter(c=>!isBranchNode(c));
        if(!between.length) continue;
        const pb=branchBoundsX(left.node), nb=branchBoundsX(right.node);
        placeDecorList(between, pb.max, nb.min);
      }
      const trailing=ch.slice(branchItems[branchItems.length-1].index+1).filter(c=>!isBranchNode(c));
      if(trailing.length){
        const pb=branchBoundsX(branchItems[branchItems.length-1].node);
        const band=decorBandSizeX(trailing, COLGAP);
        placeDecorList(trailing, pb.max, pb.max+band);
      }
    }
    function place(n, depth, left){ n._y=mainPos[depth]+n._h/2;  // 同層靠上齊頭(列線對齊上緣)
      const ch=visibleChildren(n);
      if(!ch.length){ n._x=left+(n._sub-n._w)/2; return; }
      const branchItems=ch.map((node,index)=>({node,index})).filter(it=>isBranchNode(it.node));
      if(!branchItems.length){ n._x=left+(n._sub-n._w)/2; positionDecorXBySourceOrder(n,ch,mainPos[depth+1]||mainPos[depth]); return; }
      let span=0;
      for(let i=0;i<branchItems.length;i++){
        const item=branchItems[i], next=branchItems[i+1];
        span+=item.node._sub;
        if(next) span+=decorBandSizeX(ch.slice(item.index+1,next.index), COLGAP);
      }
      let l=left+Math.max(0,(n._sub-span)/2);                            // node 較寬時:子群置中於 slot
      let first=null, last=null;
      for(let i=0;i<branchItems.length;i++){
        const item=branchItems[i], c=item.node, next=branchItems[i+1];
        place(c,depth+1,l); first=first||c; last=c;
        const between=next ? ch.slice(item.index+1,next.index) : [];
        l+=c._sub+decorBandSizeX(between, COLGAP);
      }
      const cf=first._x+first._w/2, cl=last._x+last._w/2;
      n._x=(cf+cl)/2 - n._w/2;
      positionDecorXBySourceOrder(n,ch,mainPos[depth+1]||mainPos[depth]); }
    subSize(node); place(node,0,0);
  }
}

//===================== 繪製 =====================
const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const svg = document.getElementById('edges');
const debugGuideEl = document.getElementById('debugGuide');
const statusEl = document.getElementById('status');
const emptyEl = document.getElementById('empty');
const toastEl = document.getElementById('toast');
let toastTimer=null;
const STATUS_HELP_TEXT='右鍵叫出選單(全部功能在這) · 雙擊編輯 · 拖節點換掛載/順序 · 滾輪縮放 · 拖背景平移 · Shift+滾輪水平捲動';
let statusSummary='', statusMessage='', statusLevel='';
function renderStatusBar(){
  if(!statusEl) return;
  statusEl.classList.toggle('info', statusLevel==='info');
  statusEl.classList.toggle('warn', statusLevel==='warn');
  statusEl.classList.toggle('error', statusLevel==='error');
  clearTrustedHTML(statusEl);
  const parts=[
    ['status-main', statusSummary||'沒有內容'],
    ['status-help', STATUS_HELP_TEXT],
    ['status-msg', statusMessage]
  ];
  for(const [cls,text] of parts){
    if(!text) continue;
    const sp=document.createElement('span');
    sp.className=cls;
    sp.textContent=text;
    statusEl.appendChild(sp);
  }
}
function setStatusSummary(text){ statusSummary=String(text||''); renderStatusBar(); }
function setStatusMessage(text, level='info', ttl=2600){
  statusMessage=String(text||'');
  statusLevel=level||'info';
  renderStatusBar();
  clearTimeout(toastTimer);
  if(ttl>0) toastTimer=setTimeout(()=>{ statusMessage=''; statusLevel=''; renderStatusBar(); }, ttl);
}
let edgeFlowRaf=null, edgeFlowStart=0;
function ensureEdgeFlow(){
  if(edgeFlowRaf) return;
  const step=t=>{
    if(!edgeFlowStart) edgeFlowStart=t;
    const off=-((t-edgeFlowStart)/1000*8 % 12);
    svg.querySelectorAll('path.edge-flow').forEach(p=>p.setAttribute('stroke-dashoffset', off.toFixed(2)));
    edgeFlowRaf=requestAnimationFrame(step);
  };
  edgeFlowRaf=requestAnimationFrame(step);
}
function showToast(msg){ if(!msg) return; toastEl.textContent=msg; setStatusMessage(msg,'info',2600); }

function render(){
  rebuildRefDefsFromRoots();
  const oldPos=new Map([...canvas.querySelectorAll('.node')].map(d=>[d.dataset.id,{x:d.offsetLeft,y:d.offsetTop}]));
  emptyEl.style.display = roots.length ? 'none' : 'flex';
  // remove old node divs + toggles (keep svg)
  [...canvas.querySelectorAll('.node, .toggle')].forEach(e=>e.remove());
  clearTrustedHTML(svg);
  if(!roots.length){ applyTransform(); setStatusSummary('沒有內容'); refreshMdPanel(mdTextDriven); refreshSaveState(); return; }
  canvas.classList.toggle('vert', orient==='v');
  // 顏色純由 Vivid 配色即時套用(視覺辨識用,不存檔);新節點也會自動上色
  for(const r of roots) colorizeTheme(r, VIVID_THEME);

  // 收集每個根的可見節點;list = 全部節點(供建立 DOM / 連線 / 開關鈕)
  const groups = roots.map(r=>({root:r, list:measure(r)}));
  const list = [];
  for(const g of groups) for(const it of g.list) list.push(it);
  // 1) create + measure
  for(const it of list){
    const d = document.createElement('div');
    d.className = 'node lv' + Math.min(it.depth,6) + (it.depth<=2 ? (' d'+it.depth) : '');
    d.dataset.id = it.node.id;
    const n = it.node;
    d.tabIndex=0;
    d.setAttribute('role','button');
    d.setAttribute('aria-selected', selection.has(n)?'true':'false');
    d.setAttribute('aria-label', nodeAriaLabel(n));
    if(n.kind==='preamble') d.classList.add('preamble');
    if(n.quote) d.classList.add('quote');   // 引用塊樣式
    if(n.fndef){ d.classList.add('fndef'); d.dataset.fnid=n.fnid;   // 腳註定義節點
      const fl=document.createElement('span'); fl.className='fnlabel'; fl.textContent='[腳註 '+n.fnid+']'; d.appendChild(fl); }
    // 有序清單序號(顯示在同層中的位置)
    if(n.ordered){ const i=(n.orderedNum!=null?n.orderedNum:(n.parent?n.parent.children.indexOf(n):0)+1);
      const od=document.createElement('span'); od.className='norder'; od.textContent=i+(n.orderedMarker||'.'); d.appendChild(od); }
    // checkbox(待辦)
    if(n.checked!==undefined){
      const cb=document.createElement('span'); cb.className='ckbox'+(n.checked?' on':''); cb.textContent=n.checked?'☑':'☐';
      cb.addEventListener('mousedown',ev=>ev.stopPropagation());
      cb.addEventListener('click',ev=>{ ev.stopPropagation(); snapshot(); n.checked=!n.checked; render(); });
      d.appendChild(cb);
    }
    // icon(圖示)
    if(n.icon){ const ic=document.createElement('span'); ic.className='nicon'; ic.textContent=n.icon; d.appendChild(ic); }
    // title / 表格
    const tx=document.createElement('span'); tx.className='ntext';
    if(n.refdef){ tx.textContent = n.refdef.raw || n.title || ''; }
    else if(n.alert){
      const TYPE={NOTE:'📘 NOTE',TIP:'💡 TIP',IMPORTANT:'❗ IMPORTANT',WARNING:'⚠️ WARNING',CAUTION:'🛑 CAUTION'};
      d.classList.add('alert', n.alert.toLowerCase());
      const ti=document.createElement('span'); ti.className='altitle'; ti.textContent=TYPE[n.alert]||('📘 '+n.alert);
      const bd=document.createElement('span'); bd.className='albody'; setTrustedHTML(bd, n.title? inlineMd(n.title):' ', 'alert body');
      tx.appendChild(ti); tx.appendChild(bd);
    }
    else if(n.kind==='hr'){ setTrustedHTML(tx, '<svg class="mdhr" aria-hidden="true" preserveAspectRatio="none"><line class="mdhrline" x1="0" y1="7" x2="100%" y2="7"/><g class="hrhandle"><circle cx="9" cy="7" r="6"/><line class="hrhandleGrip" x1="7" y1="4.5" x2="7" y2="9.5"/><line class="hrhandleGrip" x1="11" y1="4.5" x2="11" y2="9.5"/></g></svg>', 'markdown horizontal rule svg'); d.classList.add('hrnode'); d.title='Markdown 水平分隔線: '+(n.title||'---')+'；可抓左側握把拖曳排序'; }
    else if(n.table){ tx.classList.add('hastable'); setTrustedHTML(tx, tableHtml(n.table), 'markdown table'); d.classList.add('tablenode'); }
    else if(n.code!=null){ tx.classList.add('hascode'); setTrustedHTML(tx, '<pre class="mdpre"><code>'+escHtml(n.code)+'</code></pre>', 'markdown code block'); d.classList.add('codenode'); }
    else setTrustedHTML(tx, n.title ? inlineMd(n.title) : ' ', 'node inline markdown');
    if(tx.querySelector && tx.querySelector('img.mimg')){ tx.classList.add('hasimg'); d.classList.add('imgnode'); }
    if(n.checked) tx.style.textDecoration='line-through';
    d.appendChild(tx);
    // 引言註解:緊接此標題下方的 blockquote,呈現為內嵌引用小泡泡(泡泡中有泡泡)
    if(n.note!=null){
      const nb=document.createElement('span'); nb.className='nnote';
      const qlines=String(n.note).split('\n');
      for(const ql of qlines){ const ln=document.createElement('span'); ln.className='nqline'; setTrustedHTML(ln, ql ? inlineMd(ql) : '&nbsp;', 'node note inline markdown'); nb.appendChild(ln); }
      d.appendChild(nb);
    }
    if(n.checked) d.classList.add('done');
    if(n.quote){ /* 引用節點:用 CSS 的黑底白字,不套主題色 */ }
    else {
      if(n.fill) d.style.background = n.fill;
      if(n.text) d.style.color = n.text;            else if(n.fill) d.style.color = textColor(n.fill);
      if(n.border) d.style.borderColor = n.border;  else if(n.fill) d.style.borderColor = darken(n.fill, 0.18);
    }
    applyEffectPalette(d, n.quote ? '#1a1a1a' : (n.fill || '#ffffff'));
    if(isSel(it.node)) d.classList.add('sel');
    if(searchMatchIds.has(it.node.id)) d.classList.add('match');
    if(it.node.id===currentMatchId) d.classList.add('match-current');
    canvas.appendChild(d);
    it.dom = d;
    it.node._h = d.offsetHeight;
    it.node._w = d.offsetWidth;
    // 額外記錄「文字實際右緣」相對節點左緣的距離,僅供連線/收合鈕起點使用(不動 _w、不影響版面與高度,
    // 因此接點垂直位置不受影響)。換行長節點的框比文字寬時,連線改從文字右緣出發,消除右側留白造成的空隙。
    it.node._textW = it.node._w;
    if(!it.node.table && it.node.code==null && !it.node.alert && !it.node.note && !d.querySelector('img.mimg')){
      try{
        const nb=d.getBoundingClientRect();
        const cs=getComputedStyle(d);
        const padR=parseFloat(cs.paddingRight)||0, bR=parseFloat(cs.borderRightWidth)||0;
        const rng=document.createRange(); rng.selectNodeContents(d);
        const rects=rng.getClientRects(); const sc=scale||1;
        let maxRight=0;
        for(const r of rects){ const rr=(r.right-nb.left)/sc; if(rr>maxRight) maxRight=rr; }  // 最靠右的文字邊界
        if(maxRight>0){ const tw=Math.ceil(maxRight+padR+bR); if(tw>0 && tw < it.node._w-1) it.node._textW=tw; }
      }catch(e){ logCaught(e,'measure rendered text width'); }
    }
  }
  // 水平分隔線先給最小寬度;實際右端等 layout 完後再延伸到全畫布最右節點。
  for(const it of list){
    const n=it.node;
    if(n.kind!=='hr') continue;
    n._w=Math.max(HR_MIN_WIDTH, n._w||0); n._textW=n._w;
    it.dom.style.width=n._w+'px';
  }
  // 2) 逐一根版面配置,再於跨軸方向堆疊,使多個中心不重疊
  let cross = 0;
  for(let gi=0; gi<groups.length; gi++){
    const g = groups[gi];
    const glist = g.list;
    let mainPos=null;
    if(orient==='v'){   // 只有直式需要同層列高;橫式由每個父節點自身寬度決定子節點位置
      const maxMain = {}; let maxDepth = 0;
      for(const it of glist){ maxMain[it.depth]=Math.max(maxMain[it.depth]||0,it.node._h); if(it.depth>maxDepth) maxDepth=it.depth; }
      mainPos={0:0};
      for(let d=1; d<=maxDepth; d++) mainPos[d]=mainPos[d-1]+(maxMain[d-1]||0)+ROWGAP;
    }
    layout(g.root, mainPos);
    if(g.root.kind==='hr'){
      const band=Math.max(STACK_GAP, (orient==='h'?g.root._h:g.root._w) + VGAP*2);
      if(orient==='h'){
        const dy=cross + band/2 - g.root._y;
        for(const it of glist) it.node._y += dy;
      } else {
        const dx=cross + band/2 - (g.root._x + g.root._w/2);
        for(const it of glist) it.node._x += dx;
      }
      g.root._sub=band;
      cross += band;
      continue;
    }
    if(orient==='h'){
      for(const it of glist) it.node._y += cross;
      cross += g.root._sub;
    } else {
      for(const it of glist) it.node._x += cross;
      cross += g.root._sub;
    }
    const next=groups[gi+1];
    if(!next || next.root.kind!=='hr') cross += STACK_GAP;
  }

function startEditNote(node, noteDom, originalValue){

  noteDom.innerText = original==null ? '' : String(original);
  const r=document.createRange(); r.selectNodeContents(noteDom);
  const s=window.getSelection(); s.removeAllRanges(); s.addRange(r);
  noteDom.focus(); editing=true;
  function restoreOriginal(){
    if(original==null) delete node.note;
    else node.note=String(original);
  }
  function commit(){
    if(cancelled){
      restoreOriginal();
      noteDom.contentEditable='false'; noteDom.classList.remove('editing'); editing=false;
      noteDom.removeEventListener('blur',commit); noteDom.removeEventListener('keydown',key);
      render(); return;
    }
    const raw=noteDom.innerText.replace(/ /g,' ').replace(/\n+$/,'');
    const next = raw.trim()==='' ? null : raw;
    const old = original==null ? null : String(original);
    if(next!==old){ restoreOriginal(); snapshot(); if(next==null) delete node.note; else node.note=next; }
    else restoreOriginal();
    noteDom.contentEditable='false'; noteDom.classList.remove('editing'); editing=false;
    noteDom.removeEventListener('blur',commit); noteDom.removeEventListener('keydown',key);
    render();
  }
  function key(e){
    if(e.key==='Enter'){
      e.preventDefault();
      if(e.ctrlKey||e.metaKey){ noteDom.blur(); }
      else {
        const s=window.getSelection();
        if(s.rangeCount){
          const r=s.getRangeAt(0); r.deleteContents();
          const br=document.createTextNode('\n'); r.insertNode(br);
          r.setStartAfter(br); r.setEndAfter(br); s.removeAllRanges(); s.addRange(r);

function findHrHitNodeDom(clientX, clientY){

    const r=dom.getBoundingClientRect();

function startMarquee(e){ marq={sx:e.clientX, sy:e.clientY}; marqEl.style.display='block'; updateMarquee(e); }
function updateMarquee(e){
  const r=viewport.getBoundingClientRect();
  const x1=Math.min(marq.sx,e.clientX), y1=Math.min(marq.sy,e.clientY);
  const x2=Math.max(marq.sx,e.clientX), y2=Math.max(marq.sy,e.clientY);
  marqEl.style.left=(x1-r.left)+'px'; marqEl.style.top=(y1-r.top)+'px';
  marqEl.style.width=(x2-x1)+'px'; marqEl.style.height=(y2-y1)+'px';
}
function finishMarquee(e){
  marqEl.style.display='none';
  const box={l:Math.min(marq.sx,e.clientX), t:Math.min(marq.sy,e.clientY), r:Math.max(marq.sx,e.clientX), b:Math.max(marq.sy,e.clientY)};
  if(box.r-box.l<4 && box.b-box.t<4){ if(!e.shiftKey){ selectOnly(null); render(); } return; } // 視為點擊空白:取消選取
  canvas.querySelectorAll('.node').forEach(d=>{
    const q=d.getBoundingClientRect();
    if(q.left<box.r && q.right>box.l && q.top<box.b && q.bottom>box.t){
      const n=findByIdAll(d.dataset.id); if(n){ selection.add(n); selected=n; }
    }
  });
  render();
}

viewport.addEventListener('wheel', e=>{
  e.preventDefault();
  // 滾輪 = 縮放(以游標為中心);Shift+滾輪 = 水平平移
  if(e.shiftKey && !e.ctrlKey){ panX-=(e.deltaY||e.deltaX); applyTransform(); return; }
  const rect=viewport.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top, old=scale;
  let dy=e.deltaY; if(e.deltaMode===1) dy*=16; else if(e.deltaMode===2) dy*=rect.height;
  const k = e.ctrlKey ? 0.01 : 0.0018;   // 觸控板捏合用較大係數;一般滑鼠滾輪較平滑

function moveSel(key){
  if(!selected) return;
  // 依版面方向對應方向鍵:橫式 往父=←/往子=→/同層=↑↓;直式 往父=↑/往子=↓/同層=←→
  const toParent = orient==='h' ? 'ArrowLeft'  : 'ArrowUp';
  const toChild  = orient==='h' ? 'ArrowRight' : 'ArrowDown';
  const sibPrev  = orient==='h' ? 'ArrowUp'    : 'ArrowLeft';
  const sibNext  = orient==='h' ? 'ArrowDown'  : 'ArrowRight';
  if(key===toParent && selected.parent){ select(selected.parent); }
  else if(key===toChild){
    const ch=branchChildren(selected);
    if(ch.length) select(ch[0]);
  }
  else if((key===sibPrev||key===sibNext) && selected.parent){
    const sib=selected.parent.children; let i=sib.indexOf(selected);
    i += (key===sibPrev?-1:1); if(i>=0&&i<sib.length) select(sib[i]);
  }
}

function clearIconAndTodo(){ if(!selection.size) return; snapshot(); for(const n of selection){ delete n.icon; delete n.checked; } render(); }
function toggleTodo(){
  if(!selection.size){ setStatusMessage('請先點選節點,再切換待辦','warn',3200); return; }
  snapshot();
  const addAny=[...selection].some(n=>n.checked===undefined);   // 有人沒方塊 → 全部加上;否則全部移除

}
// 行內格式:對選取節點整段標題加上/移除 **粗體** / *斜體* / ~~刪除線~~(切換)
function toggleWrap(mk){
  if(!selection.size){ setStatusMessage('請先點選節點再套用樣式','warn',3200); return; }
  snapshot();
  for(const n of selection){ const t=n.title||'';
    if(mk==='*'){ const isBold=/^\*\*[\s\S]+\*\*$/.test(t); const m=t.match(/^\*([\s\S]+)\*$/); n.title=(m && !isBold)?m[1]:'*'+t+'*'; }
    else { const re = mk==='**' ? /^\*\*([\s\S]+)\*\*$/ : /^~~([\s\S]+)~~$/; const m=t.match(re); n.title = m ? m[1] : mk+t+mk; }
  }
  render();
}
// 連結:把選取節點包成 [文字](網址)(已是連結則換網址)
function addLink(){
  if(!selection.size){ setStatusMessage('請先點選節點再加連結','warn',3200); return; }
  const url = prompt('輸入連結網址(URL):', 'https://');
  if(!url) return;
  const safeUrl=safeLinkHref(url);
  if(!safeUrl){ showToast('連結網址無效或不安全'); return; }
  snapshot();
  for(const n of selection){ const t=n.title||''; const m=t.match(/^\[([\s\S]+)\]\(([^)]*)\)$/);
    n.title = m ? `[${m[1]}](${safeUrl})` : `[${t||'連結'}](${safeUrl})`; }
  render(); showToast('已加入連結');
}
// 有序清單 / 引用:切換節點類型(兩者互斥)
function toggleOrdered(){ if(!selection.size){ setStatusMessage('請先點選節點','warn',3200); return; } snapshot();
  const add=[...selection].some(n=>!n.ordered); for(const n of selection){ if(add){ n.ordered=true; delete n.quote; } else delete n.ordered; } render(); }
function toggleQuote(){ if(!selection.size){ setStatusMessage('請先點選節點','warn',3200); return; } snapshot();

// 固定配色:活力分支 Vivid。顏色僅供畫面辨識,不寫入 Markdown。
// palette 只需列出各主幹的主色(main),淺底與深色字由程式自動推算。
const VIVID_THEME={
  name:'活力分支 Vivid',
  center:'#3A3F47',
  // 交錯排序,讓相鄰主幹色相拉開(避免橙/黃等相鄰撞色):紅→綠→藍→橙→紫→青→粉→金
  palette:['#EF4444','#16A34A','#2F6FED','#F59E0B','#8B5CF6','#06B6D4','#EC4899','#EAB308']
};
// 只上色,不含 snapshot/render
function colorizeTheme(start, t){
  // 深色介面時,把(偏黑的)中心色調亮,避免中心節點與深色背景融在一起
  const dark = document.documentElement.classList.contains('dark');
  const center = dark ? mixHex(t.center, '#ffffff', 0.24) : t.center;
  // Vivid:深色中心;每條主幹一個鮮明色(實色底),子孫用該色淺色版(淺底+同色框+深色字)
  start.fill=center; start.border=center; start.text=textColor(center);
  const pal=t.palette, n=pal.length||1;
  branchChildren(start,{includeCollapsed:true}).forEach((c,i)=>{
    const main = pal[i % n];
    const light = mixHex(main, '#FFFFFF', 0.82);   // 淺色底(混 82% 白)
    const txt   = mixHex(main, '#16202A', 0.34);   // 深色字(混向深藍黑)
    c.fill=main; c.border=main; c.text=textColor(main);   // 主幹:實色底、自動黑/白字
    (function paint(m){ for(const ch of branchChildren(m,{includeCollapsed:true})){ ch.fill=light; ch.border=main; ch.text=txt; paint(ch); } })(c);
  });
}

const searchBar=document.getElementById('searchBar');
const searchInput=document.getElementById('searchInput');
const searchCount=document.getElementById('searchCount');
const searchWrap=document.getElementById('searchWrap');
const searchHint=document.getElementById('searchHint');
const searchList=document.getElementById('searchList');
let searchOpenedIds=new Set();
function openSearch(){ searchBar.classList.add('show'); searchWrap.classList.add('show'); searchInput.focus(); searchInput.select(); if(searchInput.value) runSearch(searchInput.value, false); else updateSearchUI(); }
function refreshSearchDom(){ canvas.querySelectorAll('.node').forEach(d=>{
  d.classList.toggle('match', searchMatchIds.has(d.dataset.id));
  d.classList.toggle('match-current', d.dataset.id===currentMatchId);
}); }
function restoreSearchOpened(){ let changed=false;
  for(const id of searchOpenedIds){ const n=findByIdAll(id); if(n && !n.collapsed){ n.collapsed=true; changed=true; } }
  searchOpenedIds.clear(); return changed;
}
function closeSearch(){ searchBar.classList.remove('show'); searchWrap.classList.remove('show'); const changed=restoreSearchOpened(); clearSearch(); if(changed) scheduleRender(); else refreshSearchDom(); }
function clearSearch(){ searchMatches=[]; searchMatchIds=new Set(); searchIdx=-1; currentMatchId=null; updateSearchUI(); }
function searchNodePath(n){ const parts=[]; let p=n; while(p){ if(p.title) parts.push(String(p.title).split('\n')[0]); p=p.parent; } return parts.reverse().join(' / '); }
function updateSearchUI(){
  const q=(searchInput.value||'').trim();
  searchCount.textContent = searchMatches.length ? ((searchIdx+1)+'/'+searchMatches.length) : '0/0';
  clearTrustedHTML(searchList);
  if(!q){ searchHint.textContent='輸入文字搜尋節點'; return; }
  if(!searchMatches.length){
    searchHint.textContent='找不到符合的節點';
    const empty=document.createElement('div'); empty.className='searchEmpty'; empty.textContent='沒有搜尋結果';
    searchList.appendChild(empty); return;
  }
  searchHint.textContent=`找到 ${searchMatches.length} 個結果`;
  searchMatches.slice(0,50).forEach((n,i)=>{
    const b=document.createElement('button'); b.type='button'; b.className='searchItem'+(i===searchIdx?' active':'');
    b.dataset.index=String(i);
    const title=document.createElement('span'); title.textContent=(n.title||n.refdef&&n.refdef.raw||n.code||'空白節點').toString().replace(/\s+/g,' ').slice(0,70);
    const path=document.createElement('small'); path.textContent=searchNodePath(n);
    b.append(title,path);
    b.onclick=()=>{ searchIdx=i; currentMatchId=n.id; updateSearchUI(); focusMatch(); };
    searchList.appendChild(b);
  });
  if(searchMatches.length>50){
    const more=document.createElement('div'); more.className='searchEmpty'; more.textContent=`另有 ${searchMatches.length-50} 筆,請輸入更精準關鍵字`;
    searchList.appendChild(more);
  }
  const active=searchList.querySelector('.searchItem.active');
  if(active) active.scrollIntoView({block:'nearest'});
}
function nodeSearchText(n){
  const parts=[n.title,n.note,n.fnid];
  if(n.code!=null) parts.push(n.code,n.lang);
  if(n.alert) parts.push(n.alert);
  if(n.table){ parts.push(...n.table.header,...n.table.aligns); for(const r of n.table.rows) parts.push(...r); }
  return parts.filter(v=>v!=null).join('\n');
}
function runSearch(q, focusFirst){
  const query=(q||'').trim().toLowerCase();
  searchMatches=[];
  if(query && roots.length){ for(const r of roots) (function walk(n){ if(nodeSearchText(n).toLowerCase().includes(query)) searchMatches.push(n); for(const c of n.children) walk(c); })(r); }
  searchMatchIds=new Set(searchMatches.map(n=>n.id));
  searchIdx = searchMatches.length ? 0 : -1;
  currentMatchId = searchIdx>=0 ? searchMatches[0].id : null;
  updateSearchUI();
  if(focusFirst && searchIdx>=0) focusMatch(); else refreshSearchDom();
}
function focusMatch(){ const node=searchMatches[searchIdx]; if(!node) return;
  let p=node.parent; while(p){ if(p.collapsed){ searchOpenedIds.add(p.id); p.collapsed=false; } p=p.parent; }   // 暫時展開命中所在的收合分支
  selectOnly(node); render(); centerOn(node); }
function gotoMatch(delta){ if(!searchMatches.length) return;
  searchIdx=(searchIdx+delta+searchMatches.length)%searchMatches.length;
  currentMatchId=searchMatches[searchIdx].id; updateSearchUI(); focusMatch(); }
function centerOn(node){ const dx=canvas._dx||0, dy=canvas._dy||0;
  panX=viewport.clientWidth/2-(node._x+dx+node._w/2)*scale;
  panY=viewport.clientHeight/2-(node._y+dy)*scale; applyTransform(); }
searchInput.addEventListener('input', ()=>runSearch(searchInput.value, false));
searchInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); if(searchIdx<0) runSearch(searchInput.value, true); else gotoMatch(e.shiftKey?-1:1); }
  else if(e.key==='Escape'){ e.preventDefault(); closeSearch(); }
  e.stopPropagation();
});
document.getElementById('searchPrev').onclick=()=>gotoMatch(-1);
document.getElementById('searchNext').onclick=()=>gotoMatch(1);
document.getElementById('searchClose').onclick=closeSearch;
document.getElementById('btnSearch').onclick=()=>{ if(searchBar.classList.contains('show')) closeSearch(); else openSearch(); };
document.getElementById('btnSearchPrevTool').onclick=()=>{ if(!searchBar.classList.contains('show')) openSearch(); gotoMatch(-1); };
document.getElementById('btnSearchNextTool').onclick=()=>{ if(!searchBar.classList.contains('show')) openSearch(); gotoMatch(1); };
document.getElementById('btnSearchClearTool').onclick=()=>{ searchInput.value=''; clearSearch(); refreshSearchDom(); if(searchBar.classList.contains('show')) searchInput.focus(); };

const ctxEl=document.getElementById('ctxmenu');
let ctxSubs=[];   // 開啟中的子選單堆疊
function closeSubsFrom(level){ while(ctxSubs.length>level){ ctxSubs.pop().remove(); } }
function hideCtx(){ ctxEl.style.display='none'; clearTrustedHTML(ctxEl); closeSubsFrom(0); }
function closeSiblingSubmenus(level, owner){
  closeSubsFrom(level);
  const menu=owner&&owner.parentElement;
  if(menu) menu.querySelectorAll(':scope > button[aria-haspopup="menu"]').forEach(b=>{ if(b!==owner) b.setAttribute('aria-expanded','false'); });
}
function renderMenu(container, items, level){
  container.setAttribute('role','menu');
  container.setAttribute('aria-label', level ? '右鍵子選單' : '右鍵選單');
  for(const it of items){
    if(it==='—'){ const d=document.createElement('div'); d.className='mdiv'; d.setAttribute('role','separator'); container.appendChild(d); continue; }
    if(it && it.header){ const h=document.createElement('div'); h.className='ctxhdr'; h.setAttribute('role','presentation'); h.textContent=it.header; container.appendChild(h); continue; }
    const b=document.createElement('button');
    b.type='button';
    b.setAttribute('role','menuitem');
    setTrustedHTML(b, it.sub ? `${escHtml(it.label)}<small>▸</small>` : (it.key ? `${escHtml(it.label)}<small>${escHtml(it.key)}</small>` : escHtml(it.label)), 'context menu item');
    b.setAttribute('aria-label', String(it.label||'').replace(/[^\p{L}\p{N}\s/.-]/gu,'').trim() || '選單項目');
    if(it.disabled){ b.disabled=true; container.appendChild(b); continue; }
    if(it.sub){
      b.setAttribute('aria-haspopup','menu');
      b.setAttribute('aria-expanded','false');
      b.addEventListener('mouseenter', ()=>{
        closeSiblingSubmenus(level, b);
        b.setAttribute('aria-expanded','true');
        const sub=document.createElement('div'); sub.className='ctxmenu'; sub.style.display='block';
        renderMenu(sub, it.sub, level+1);
        wireMenuKeyboard(sub);
        document.body.appendChild(sub); ctxSubs.push(sub);
        const r=b.getBoundingClientRect(), sw=sub.offsetWidth, sh=sub.offsetHeight;
        let sx=r.right-2; if(sx+sw>innerWidth-6) sx=r.left-sw+2; sx=Math.max(6,sx);
        let sy=r.top-5; if(sy+sh>innerHeight-6) sy=Math.max(6, innerHeight-sh-6);
        sub.style.left=sx+'px'; sub.style.top=sy+'px';
      });
    } else {
      b.addEventListener('mouseenter', ()=>closeSiblingSubmenus(level, b));
      b.onclick=()=>{ hideCtx(); it.fn(); };
    }
    container.appendChild(b);
  }
}
function showCtx(x,y,items){
  closeSubsFrom(0); clearTrustedHTML(ctxEl); ctxEl.style.display='block';
  renderMenu(ctxEl, items, 0);
  wireMenuKeyboard(ctxEl);
  const mw=ctxEl.offsetWidth, mh=ctxEl.offsetHeight;
  ctxEl.style.left=Math.min(x, innerWidth-mw-8)+'px';
  ctxEl.style.top=Math.max(6, Math.min(y, innerHeight-mh-8))+'px';
  const first=ctxEl.querySelector('button:not(:disabled)'); if(first) first.focus();
}
function ctxMenuButtons(menu){ return [...menu.querySelectorAll(':scope > button:not(:disabled)')]; }
function focusMenuButton(menu, delta){
  const bs=ctxMenuButtons(menu); if(!bs.length) return;
  const i=Math.max(0, bs.indexOf(document.activeElement));
  bs[(i+delta+bs.length)%bs.length].focus();
}
function wireMenuKeyboard(menu){
  if(menu._keyboardWired) return;
  menu._keyboardWired=true;
  menu.tabIndex=-1;
  menu.addEventListener('keydown', e=>{
    if(e.key==='ArrowDown'){ e.preventDefault(); focusMenuButton(menu, 1); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); focusMenuButton(menu, -1); }
    else if(e.key==='Enter' || e.key===' '){ e.preventDefault(); if(document.activeElement && menu.contains(document.activeElement)) document.activeElement.click(); }
    else if(e.key==='ArrowRight'){ e.preventDefault(); const active=document.activeElement; if(active&&active.getAttribute('aria-haspopup')==='menu'){ active.dispatchEvent(new Event('mouseenter')); const sub=ctxSubs[ctxSubs.length-1]; if(sub){ const b=sub.querySelector('button:not(:disabled)'); if(b) b.focus(); } } }
    else if(e.key==='ArrowLeft'){ e.preventDefault(); const parentMenu=menu.parentElement&&menu.parentElement.closest&&menu.parentElement.closest('.ctxmenu'); const sub=ctxSubs.pop(); if(sub) sub.remove(); const owner=[...document.querySelectorAll('.ctxmenu button[aria-expanded="true"]')].pop(); if(owner){ owner.setAttribute('aria-expanded','false'); owner.focus(); } else if(parentMenu){ const b=parentMenu.querySelector('button:not(:disabled)'); if(b) b.focus(); } }
    else if(e.key==='Escape'){ e.preventDefault(); hideCtx(); }
  });
}

  if(cmdActiveIndex>=cmdMatches.length) cmdActiveIndex=Math.max(0, cmdMatches.length-1);
  clearTrustedHTML(cmdListEl);
  if(!cmdMatches.length){
    const empty=document.createElement('div'); empty.className='cmdempty'; empty.textContent='找不到符合的命令';

  cmdMatches.forEach((cmd,i)=>{

    b.onclick=()=>executeCommand(cmd);

function executeCommand(cmd){
  if(!cmd) return;
  closeCommandPalette();

function fitViewForContent(w, h, vw, vh, padding=80){
  w=Math.max(1, Number(w)||1); h=Math.max(1, Number(h)||1);
  vw=Math.max(1, Number(vw)||1); vh=Math.max(1, Number(vh)||1);
  const usableW=Math.max(1, vw-padding);
  const usableH=Math.max(1, vh-padding);
  const nextScale=Math.max(MIN_ZOOM_SCALE, Math.min(1, Math.min(usableW/w, usableH/h)));
  return {
    scale:nextScale,
    panX:(vw - w*nextScale)/2,
    panY:(vh - h*nextScale)/2
  };
}
function fit(){
  if(!roots.length){ return; }
  render();
  const w=parseFloat(svg.getAttribute('width'))||1, h=parseFloat(svg.getAttribute('height'))||1;
  const view=fitViewForContent(w, h, viewport.clientWidth, viewport.clientHeight, 80);
  scale=view.scale; panX=view.panX; panY=view.panY;
  applyTransform();
}

const FW_KEY=STORAGE_KEYS.floatingWindows;   // 版號:工具視窗組成再變更(新增「清單」窗、文字窗加 S/🔗),重設一次排版
let fwPos=storageJsonGet(FW_KEY, {}, 'read floating window positions')||{};
function saveFwPos(){ storageJsonSet(FW_KEY, fwPos, 'save floating window positions'); }
let fwZ=100;
function clampFloatWinPosition(w, pos){
  const r=w.getBoundingClientRect();
  const ww=Math.max(46, Math.round(r.width||w.offsetWidth||46));
  const wh=Math.max(28, Math.round(r.height||w.offsetHeight||28));
  const maxLeft=Math.max(0, window.innerWidth-Math.min(46, ww));
  const maxTop=Math.max(0, window.innerHeight-Math.min(28, wh));
  return {
    left:Math.max(0, Math.min(Number(pos&&pos.left)||0, maxLeft)),
    top:Math.max(0, Math.min(Number(pos&&pos.top)||0, maxTop))
  };
}
function applyFloatWinPosition(w, pos){
  const next=clampFloatWinPosition(w, pos);
  w.style.left=next.left+'px';
  w.style.top=next.top+'px';
  return next;
}
function sanitizeFloatWinPositions(){
  let changed=false;
  for(const w of document.querySelectorAll('.floatwin')){
    if(!fwPos[w.id]) continue;
    const next=applyFloatWinPosition(w, fwPos[w.id]);
    if(next.left!==fwPos[w.id].left || next.top!==fwPos[w.id].top){
      fwPos[w.id]=next;
      changed=true;
    }
  }
  if(changed) saveFwPos();
  return changed;
}

const FLOAT_TOP=14, FLOAT_LEFT=14, FLOAT_GAP=14, FLOAT_ROW_GAP=10;
const FLOAT_ORDER=['fwBrand','fwFile','fwEdit','fwSearch','fwView'];
// 預設排版:上方水平排列,同列 top 對齊;寬度不足時換到下一排。
// 使用者拖過的視窗(已記憶位置)則沿用,重設工具列會回到此排列。
function placeFloatWins(){
  let x=FLOAT_LEFT, y=FLOAT_TOP, rowH=0;
  const wins=FLOAT_ORDER.map(id=>document.getElementById(id)).filter(Boolean);
  for(const w of wins){
    if(fwPos[w.id]){ fwPos[w.id]=applyFloatWinPosition(w, fwPos[w.id]); continue; }
    const ww=w.offsetWidth, wh=w.offsetHeight;
    if(x>FLOAT_LEFT && x+ww>window.innerWidth-FLOAT_LEFT){
      x=FLOAT_LEFT;
      y+=rowH+FLOAT_ROW_GAP;
      rowH=0;
    }
    applyFloatWinPosition(w, {left:x, top:y});
    x+=ww+FLOAT_GAP;
    rowH=Math.max(rowH, wh);
  }
  saveFwPos();
}

(function(){ let d=null, cur=null;
  document.querySelectorAll('.fwhead').forEach(head=>{
    head.addEventListener('mousedown', e=>{
      if(e.target.closest('.fwcollapse')) return;
      cur=head.closest('.floatwin'); const r=cur.getBoundingClientRect();
      d={x:e.clientX, y:e.clientY, l:r.left, t:r.top}; cur.style.zIndex=++fwZ; e.preventDefault();
    });
  });
  window.addEventListener('mousemove', e=>{ if(!d) return;
    let nl=d.l+e.clientX-d.x, nt=d.t+e.clientY-d.y;
    nl=Math.max(0, Math.min(nl, window.innerWidth-46));
    nt=Math.max(0, Math.min(nt, window.innerHeight-28));
    cur.style.left=nl+'px'; cur.style.top=nt+'px';
  });
  window.addEventListener('mouseup', ()=>{ if(d&&cur){
    // 一次記住全部視窗位置,避免「部分記憶、部分自動」造成重疊
    document.querySelectorAll('.floatwin').forEach(w=>{ fwPos[w.id]={left:parseInt(w.style.left)||0, top:parseInt(w.style.top)||0}; });
    saveFwPos(); } d=null; cur=null; });
})();

function collectTemplateStats(nodes){
  const stats={roots:nodes.filter(isBranchNode).length,nodes:0,preamble:0,hr:0,table:0,code:0,alert:0,alerts:new Set(),fndef:0,refdef:0,quote:0,notes:0,todo:0,ordered:0,images:0,links:0};
  const walk=n=>{
    stats.nodes++;
    if(n.kind==='preamble') stats.preamble++;
    if(n.kind==='hr') stats.hr++;
    if(n.table) stats.table++;
    if(n.code!=null) stats.code++;
    if(n.alert){ stats.alert++; stats.alerts.add(n.alert); }
    if(n.fndef) stats.fndef++;
    if(n.refdef) stats.refdef++;
    if(n.quote) stats.quote++;
    if(n.note) stats.notes++;
    if(n.checked!==undefined) stats.todo++;
    if(n.ordered) stats.ordered++;
    const text=(n.title||'')+'\n'+(n.note||'');
    if(/<img\b|!\[/.test(text)) stats.images++;
    if(/<a\b|https?:\/\//.test(text)) stats.links++;
    for(const c of n.children) walk(c);
  };
  for(const r of nodes) walk(r);
  return stats;
}
function runTemplateSelfTest(options={}){
  const checks=[];
  const add=(name, ok, detail)=>checks.push({name, ok:!!ok, detail:detail||''});
  try{
    const parsed=parseMarkdown(DEFAULT_MARKDOWN);
    const stats=collectTemplateStats(parsed);
    const exported=toMarkdown(parsed);
    add('範本可解析成多中心心智圖', stats.roots>=2, `${stats.roots} roots`);
    add('範本節點數足夠覆蓋主要功能', stats.nodes>=120, `${stats.nodes} nodes`);
    add('開頭序言節點存在', stats.preamble>=1, `${stats.preamble} preamble`);
    add('多層級水平分隔線存在', stats.hr>=3, `${stats.hr} hr`);
    add('表格節點存在', stats.table>=1, `${stats.table} table`);
    add('程式碼區塊存在', stats.code>=1, `${stats.code} code`);
    add('五種警示框皆存在', ['NOTE','TIP','IMPORTANT','WARNING','CAUTION'].every(t=>stats.alerts.has(t)), [...stats.alerts].join(','));
    add('腳註定義存在', stats.fndef>=1, `${stats.fndef} footnote`);
    add('參考式連結/圖片定義存在', stats.refdef>=3, `${stats.refdef} refs`);
    add('引用與標題註解存在', stats.quote>=1 && stats.notes>=1, `${stats.quote} quotes, ${stats.notes} notes`);
    add('待辦與有序清單存在', stats.todo>=2 && stats.ordered>=3, `${stats.todo} todos, ${stats.ordered} ordered`);
    add('圖片與連結示範存在', stats.images>=1 && stats.links>=2, `${stats.images} images, ${stats.links} links`);
    add('匯出仍保留水平分隔線', /^---$/m.test(exported), '---');
    add('匯出仍保留表格', /\| 項目 \| 數量 \| 狀態 \|/.test(exported), 'table markdown');
    add('匯出仍保留程式碼圍欄', /```text/.test(exported), '```text');
    const failed=checks.filter(c=>!c.ok);
    const result={ok:failed.length===0, passed:checks.length-failed.length, failed:failed.length, checks, stats};
    if(options.log) console.table(checks);
    if(options.toast) showToast(result.ok ? `範本自檢通過:${result.passed}/${checks.length}` : `範本自檢失敗:${failed.length} 項`);
    return result;
  }catch(e){
    logCaught(e,'template self test');
    const result={ok:false, passed:0, failed:1, checks:[{name:'範本自檢執行例外', ok:false, detail:String(e&&e.message||e)}]};
    if(options.toast) showToast('範本自檢執行失敗');
    return result;
  }
}

    out=toMarkdown(parsed);
    add('引用節點保留巢狀引用 marker', /^> > 第二層$/m.test(out), out);
    add('行內連結支援網址括號', /href="https:\/\/example\.com\/a\(b\)"/.test(inlineMd('[link](https://example.com/a(b))')), inlineMd('[link](https://example.com/a(b))'));

# MD心智圖 · 使用說明
> 【根節點 # 的註解】這份說明會帶你快速上手所有功能。
> 緊接在標題下方的引言,會收進標題泡泡內當「註解」(泡泡中有泡泡)。
## 🚀 三步上手
> 【第二層 ## 的註解】最快的開始方式,照著三步走就會了。
- 第一步:雙擊任一節點即可編輯文字;Enter 完成、Esc 取消
- 第二步:選一個節點,按 Tab 長出子節點、按 Enter 加同層節點
- 第三步:完成後在空白處右鍵 → 檔案 → 匯出,存成 .md 保存
- 小提醒:本工具不會自動存檔,離開前請記得匯出
## 🖱 操作介面
### 右鍵選單是總入口
> 【第三層 ### 的註解】幾乎所有功能都在右鍵選單裡。
> 在節點上、或在空白處按右鍵,選單內容會不一樣。
- 在節點上按右鍵:編輯、文字格式、清單、圖示、複製貼上、刪除、收合
- 在空白處按右鍵:新增中心主題、貼上、檔案、檢視、主題、全部展開或收合
- 含子選單:文字格式 / 清單 / 圖示 / 檔案 / 檢視 / 主題
#### 右鍵子選單(第四層示範)
> 【第四層 #### 的註解】更深的層級一樣可以有引言註解。
> 註解功能不限層級,任何標題下方緊接的引言都會收進泡泡。
- 子選單裡還能再展開細項

### 滑鼠與觸控
- 拖背景 = 平移;滾輪 = 縮放;Shift+滾輪 = 水平捲動
- 單擊 = 選取;雙擊 = 編輯;拖節點 = 搬移
- 觸控:單指平移、雙指縮放、點兩下編輯
## ✏️ 編輯節點
### 新增
- Tab:在選取節點底下長出子節點
- Enter:在同一層再加一個節點
- Shift+Tab:在上方插入一層父節點
- 空白處右鍵「新增中心主題」可開另一張獨立心智圖
### 刪除與復原
- Del 或 Backspace:刪除選取節點(可多選一起刪)
- Ctrl+Z 復原;Ctrl+Y 或 Ctrl+Shift+Z 重做
### 搬移與排序
- 拖到另一節點上面 = 改掛載(換父節點)
- 拖到節點上方或下方 = 同層換順序
- 拖到空白處 = 脫離成獨立中心主題
- 方向鍵:在節點之間移動選取焦點
### 多選
- Ctrl+點選:逐一加選或取消
- Shift+拖曳空白處:框選一整區
- Ctrl+A:全選所有節點

## 📝 原始 Markdown 面板(雙向同步)
- 開關:點畫面右緣的「原始碼」分頁,或右鍵 → 檢視 → 原始 Markdown 面板
- 點節點 → 面板會高亮對應的文字列並捲動到位
- 高亮:目前節點對應行會以淡色橫條標示,行距較寬方便對照
- 點文字列 → 心智圖會選取並置中對應節點
- 提示:如果程式碼區塊、HTML 註解、details 或表格欄數看起來有問題,面板下方會顯示行號;點提示可跳到該行
- 即時編輯:在面板裡改 Markdown,心智圖會即時跟著更新
- 調整:拖面板左緣可改寬度;開關與寬度都會自動記住
- 大型檔案保護:貼入很多行 Markdown 時,同步會自動放慢,避免每打一字就卡住
## 💾 匯出與檔案
- 匯出 .md:右鍵 → 檔案 → 匯出(或 Ctrl+S),這才是保存原始 Markdown 原稿
- 匯出 HTML 單檔:右鍵 → 檔案 → 匯出 HTML 單檔,可離線開啟完整工具,但不是原稿保存
- 匯出 JPG:右鍵 → 檔案 → 匯出 JPG,整張圖的高解析圖片;未保存時會先提醒
- 匯出 PDF:右鍵 → 檔案 → 匯出 PDF,整張圖縮放置入單張 A4;未保存時會先提醒
- 匯出前檢查:匯出 .md 前會提醒空標題、過長節點、未閉合程式碼區塊與表格欄位問題
- 快速修正:檢查報告中點擊空標題可補成「未命名節點」,點擊過長節點可定位並開啟編輯
- 全部可安全修正:匯出前檢查可批次補空標題,不會自動改寫過長文字或語法內容
- 重新檢查:修正問題後可在報告上直接刷新清單,不用重新執行匯出
- 忽略本次提醒:只關閉目前這次報告,不會改變永久檢查設定
- 報告按鈕主次:重新檢查是主要動作,安全修正是輔助動作,忽略本次使用低調樣式
- 分頁標題:瀏覽器分頁會顯示 MD心智圖 與目前版號,避免舊分頁顯示未命名
- 分隔線拖曳:低縮放時,分隔線上下仍保留螢幕像素熱區,比較容易抓取
- 分隔線握把:滑過或選取分隔線時,左側會顯示拖曳握把提示
- 嚴重度分組:匯出前檢查會分成錯誤、警告、建議,優先處理錯誤再看警告
- 檢查設定:右鍵 → 檔案 → 匯出前檢查設定,可調整過長節點門檻或關閉部分提醒
- 開啟:右鍵 → 檔案 → 開啟,或把 .md 檔直接拖進畫面
- 新建:右鍵 → 檔案 → 新建,開一張空白心智圖
- 保存方式:本工具不使用自動草稿;離開前請用「匯出 Markdown」保存,HTML/JPG/PDF 不等於保存原始稿
## 🎨 配色
- 固定使用活力分支 Vivid 配色,不提供主題切換
- 顏色只是畫面視覺辨識,不會寫進 .md;載入時自動上色
## 🧭 版面與檢視
- 版面:固定 Markdown 順序瀏覽,父節點在左、同層由上往下排列,更接近原始 Markdown 的閱讀順序
- 置中:右鍵 → 檢視 → 置中,或右下角 ＋／－ 縮放、⤢ 重置
- 深色介面:右鍵 → 檢視 → 深色或淺色(會記住選擇)
- 搜尋:Ctrl+F,Enter 跳下一個、Shift+Enter 跳上一個
- 命令面板:Ctrl+K,或右鍵 → 檢視 → 命令面板,可搜尋檔案、檢視、版面與自檢命令
- 每個節點右側的圓圈 ＋／－ 可展開或收合該分支
- 診斷/自檢:右鍵 → 診斷/自檢,可檢查範本、Markdown 規則、大型 Markdown、匯出、HTML 單檔、分隔線位置、命令面板、右鍵選單、搜尋體驗、鍵盤操作與完整流程
- 自檢報告:執行完整自檢後會顯示報告面板,列出各組通過狀態與失敗原因
- 匯出自檢:會確認分隔線、表格、HTML、JPG/PDF 結構都有被匯出

document.documentElement.dataset.interactionSelfTest=interactionSelfTestResult.ok?'pass':'fail';
document.documentElement.dataset.interactionSelfTestPassed=String(interactionSelfTestResult.passed);
document.documentElement.dataset.interactionSelfTestFailed=String(interactionSelfTestResult.failed);
document.documentElement.dataset.interactionSelfTestDetail=interactionSelfTestResult.checks.filter(c=>!c.ok).map(c=>c.name+': '+c.detail).join(' | ');
selectOnly(roots[0]);
markSaved();
render(); fit();   // 顏色由 render() 依目前主題即時套用(預設 Vivid)
// 字體載入完成後,節點寬度會變化;重算一次版面,避免連接線與節點邊緣對不齊(出現空隙)
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>{ try{ const a=selected; renderKeepingAnchor(a); }catch(e){ logCaught(e,'font-ready anchor render'); try{ render(); }catch(_){ logCaught(_,'font-ready fallback render'); } } }); }
(function(){ const op=storageGet(STORAGE_KEYS.markdownPanelOpen, null, 'read markdown panel open state'); if(op==='1') toggleMdPanel(true); })();
</script>
