name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Test version consistency gate
        run: node scripts/check-version-consistency.test.js

      - name: Check repository version consistency
        run: node scripts/check-version-consistency.js

      - name: Test deployment tool contract
        shell: pwsh
        run: ./scripts/test-deploy.ps1

      - name: Prepare single-file site
        run: |
          mkdir site
          cp index.html site/index.html
          touch site/.nojekyll

      - name: Run browser self-test gate
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 --directory site > /tmp/md-mind-map-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:4173/index.html > /dev/null; then
              break
            fi
            if [[ "$attempt" == "20" ]]; then
              cat /tmp/md-mind-map-http.log
              exit 1
            fi
            sleep 0.25
          done

          chrome_bin="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          if [[ -z "$chrome_bin" ]]; then
            echo "Headless Chrome is not available on this runner."
            exit 1
          fi

          timeout 90 "$chrome_bin" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --disable-background-timer-throttling \
            --virtual-time-budget=30000 \
            --dump-dom \
            'http://127.0.0.1:4173/index.html?ci-selftest=1' \
            > /tmp/md-mind-map-selftest.html

          if ! grep -q 'data-ci-self-test="pass"' /tmp/md-mind-map-selftest.html \
            || ! grep -q 'data-ci-self-test-passed="11"' /tmp/md-mind-map-selftest.html \
            || ! grep -q 'data-ci-self-test-failed="0"' /tmp/md-mind-map-selftest.html; then
            echo "Browser self-test gate failed."
            grep -o 'data-ci-self-test[^ >]*="[^"]*"' /tmp/md-mind-map-selftest.html || true
            exit 1
          fi

          echo "Browser self-test gate passed: 11/11 groups."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
